# Push to main → sync to DreamHost (or any FTP) via GitHub Actions.
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   Deploy: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_SERVER_DIR
#   Runtime (written to secrets.local.php on each deploy):
#     AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (required)
#     AWS_DEFAULT_REGION, GOOGLE_MAPS_API_KEY, RAPIDAPI_KEY, MAPBOX_ACCESS_TOKEN (optional)
name: Deploy FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write secrets.local.php from repository secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: php .github/scripts/write-secrets-local.php

      - name: Remove legacy aws-env.local.php on server
        continue-on-error: true
        run: |
          server_dir="${{ secrets.FTP_SERVER_DIR }}"
          server_dir="${server_dir%/}"
          curl --ftp-silent --show-error \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "ftp://${{ secrets.FTP_SERVER }}/${server_dir}/" \
            -Q "DELE aws-env.local.php"

      - name: FTP deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Remote path from FTP user home, e.g. pinchard.is or pinchards.is (DreamHost panel shows this)
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # DreamHost FTP often returns "500 AUTH not understood" with ftps — use plain ftp on port 21
          protocol: ftp
          port: 21
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
