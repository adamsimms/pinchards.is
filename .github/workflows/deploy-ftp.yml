# Push to main → sync to DreamHost via SFTP/rsync over SSH (GitHub Actions).
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   Deploy: FTP_SERVER, FTP_USERNAME, FTP_SERVER_DIR, SSH_DEPLOY_KEY
#   Runtime (written to secrets.local.php on each deploy):
#     AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (required)
#     AWS_DEFAULT_REGION, GOOGLE_MAPS_API_KEY, MAPBOX_ACCESS_TOKEN (optional)
#
# One-time setup: generate an ed25519 deploy key, append the public key to
# ~/.ssh/authorized_keys on the server, and store the private key as SSH_DEPLOY_KEY.
# FTP_SERVER should be the SSH hostname (often your domain or psNNNN.dreamhost.com).
# FTP_SERVER_DIR must be the absolute remote path, e.g. /home/USER/pinchards.is
name: Deploy SFTP

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: rsync dry-run (no files changed on server)
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write secrets.local.php from repository secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: php .github/scripts/write-secrets-local.php

      - name: Setup SSH deploy key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_DEPLOY_KEY}" ]; then
            echo "Missing secret: SSH_DEPLOY_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_DEPLOY_KEY}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${FTP_SERVER}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Validate deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          FTP_SERVER="$(trim "${FTP_SERVER}")"
          FTP_USERNAME="$(trim "${FTP_USERNAME}")"
          FTP_SERVER_DIR="$(trim "${FTP_SERVER_DIR}")"
          for name in FTP_SERVER FTP_USERNAME FTP_SERVER_DIR; do
            if [ -z "${!name}" ]; then
              echo "Missing secret: ${name}"
              exit 1
            fi
          done
          if [[ "${FTP_SERVER}" == *"@"* ]] || [[ "${FTP_SERVER}" == *"://"* ]] || [[ "${FTP_SERVER}" == *"/"* ]] || [[ "${FTP_SERVER}" == *":"* ]]; then
            echo "FTP_SERVER must be hostname only (e.g. iad1-shared-b8-36.dreamhost.com)."
            echo "Do not include user@, port :22, sftp://, or a path."
            exit 1
          fi
          if [[ "${FTP_SERVER_DIR}" != /* ]]; then
            echo "FTP_SERVER_DIR must be an absolute path (e.g. /home/pinchard/pinchards.is), not a relative folder name."
            exit 1
          fi
          if [[ "${FTP_SERVER_DIR}" == *"@"* ]] || [[ "${FTP_SERVER_DIR}" == *"://"* ]]; then
            echo "FTP_SERVER_DIR must be a path only. Put the hostname in FTP_SERVER and username in FTP_USERNAME."
            exit 1
          fi
          echo "FTP_SERVER resolves next; FTP_SERVER_DIR length: ${#FTP_SERVER_DIR}"

      - name: Test SSH connection
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        run: |
          set -euo pipefail
          host="$(printf '%s' "${FTP_SERVER}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          user="$(printf '%s' "${FTP_USERNAME}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=20 -p 22 \
            "${user}@${host}" "echo SSH OK from GitHub Actions"

      - name: Remove legacy aws-env.local.php on server
        continue-on-error: true
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          host="$(printf '%s' "${FTP_SERVER}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          user="$(printf '%s' "${FTP_USERNAME}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          server_dir="$(printf '%s' "${FTP_SERVER_DIR}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          server_dir="${server_dir%/}"
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -p 22 \
            "${user}@${host}" \
            "rm -f '${server_dir}/aws-env.local.php'"

      - name: SFTP deploy (rsync over SSH)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail
          host="$(printf '%s' "${FTP_SERVER}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          user="$(printf '%s' "${FTP_USERNAME}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          server_dir="$(printf '%s' "${FTP_SERVER_DIR}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          server_dir="${server_dir%/}/"
          dry_run=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            dry_run="--dry-run"
          fi
          dest="${host}:${server_dir}"
          echo "rsync target host: ${host}"
          echo "rsync target path: ${server_dir}"
          rsync -avzr --delete ${dry_run} \
            --exclude '.git/' \
            --exclude '.git*/' \
            --exclude '.github/' \
            -e "ssh -i ${HOME}/.ssh/deploy_key -o BatchMode=yes -p 22 -l ${user}" \
            ./ "${dest}"
