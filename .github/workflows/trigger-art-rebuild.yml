# Trigger art Cloudberry archive rebuild
#
# Art Pages listens for repository_dispatch type cloudberry-archive-rebuild
# (see adamsimms/art.adamsimms.xyz .github/workflows/deploy.yml).
#
# One-time secret on this repo:
#   ART_DISPATCH_TOKEN — fine-grained PAT (or classic) with permission to
#   trigger workflows on adamsimms/art.adamsimms.xyz (Actions: write).
name: Trigger art archive rebuild

on:
  push:
    branches:
      - main
    paths:
      - 'js/**'
      - 'css/**'
      - 'data/catalog.json'
      - 'scripts/build-static-archive.php'
      - 'scripts/build-catalog.php'
      - 'images/**'
      - 'vendor/bootstrap/**'
      - 'vendor/gsap/**'
      - 'favicon/**'
  workflow_dispatch:

jobs:
  dispatch:
    name: repository_dispatch → art.adamsimms.xyz
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch cloudberry-archive-rebuild
        env:
          ART_DISPATCH_TOKEN: ${{ secrets.ART_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ART_DISPATCH_TOKEN}" ]; then
            echo "::warning::ART_DISPATCH_TOKEN is not set — skipping art rebuild dispatch."
            echo "Create a fine-grained PAT with Actions: write on adamsimms/art.adamsimms.xyz"
            echo "and store it as repository secret ART_DISPATCH_TOKEN."
            exit 0
          fi
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${ART_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/adamsimms/art.adamsimms.xyz/dispatches" \
            -d "{\"event_type\":\"cloudberry-archive-rebuild\",\"client_payload\":{\"source\":\"pinchards.is\",\"sha\":\"${GITHUB_SHA}\",\"ref\":\"${GITHUB_REF}\"}}"
          echo "Dispatched cloudberry-archive-rebuild to art.adamsimms.xyz (sha ${GITHUB_SHA})"
