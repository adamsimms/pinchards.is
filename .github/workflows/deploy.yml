# Push to main → sync to DreamHost via rsync over SSH (GitHub Actions).
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   Deploy: FTP_SERVER, FTP_USERNAME, FTP_SERVER_DIR, SSH_DEPLOY_KEY
#   Runtime (uploaded outside the web document root on each deploy):
#     AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (required)
#     AWS_DEFAULT_REGION, GOOGLE_MAPS_API_KEY, MAPBOX_ACCESS_TOKEN (optional)
#
# One-time setup: generate an ed25519 deploy key, append the public key to
# ~/.ssh/authorized_keys on the server, and store the private key as SSH_DEPLOY_KEY.
# FTP_SERVER should be the SSH hostname (often your domain or psNNNN.dreamhost.com).
# FTP_SERVER_DIR must be the absolute remote path, e.g. /home/USER/pinchards.is
name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: rsync dry-run (no files changed on server)
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader
          npm ci
          npm run vendor:frontend

      - name: Write secrets.local.php from repository secrets
        env:
          PINCHARD_SECRETS_OUTPUT: ${{ runner.temp }}/secrets.local.php
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: php .github/scripts/write-secrets-local.php

      - name: Setup SSH deploy key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_DEPLOY_KEY}" ]; then
            echo "Missing secret: SSH_DEPLOY_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${SSH_DEPLOY_KEY}" | tr -d '\r' > ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "SSH_DEPLOY_KEY is not a valid OpenSSH private key; trying base64 decode..."
            printf '%s' "${SSH_DEPLOY_KEY}" | tr -d ' \t\r\n' | base64 -d > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
          fi
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::SSH_DEPLOY_KEY is invalid in GitHub Secrets."
            echo "On your Mac run: base64 < ~/.ssh/pinchards_deploy | pbcopy"
            echo "Paste that single line as SSH_DEPLOY_KEY (replace the existing secret)."
            exit 1
          fi
          host="$(printf '%s' "${FTP_SERVER}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          ssh-keyscan -H "${host}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Validate deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          FTP_SERVER="$(trim "${FTP_SERVER}")"
          FTP_USERNAME="$(trim "${FTP_USERNAME}")"
          FTP_SERVER_DIR="$(trim "${FTP_SERVER_DIR}")"
          for name in FTP_SERVER FTP_USERNAME FTP_SERVER_DIR; do
            if [ -z "${!name}" ]; then
              echo "Missing secret: ${name}"
              exit 1
            fi
          done
          if [[ "${FTP_SERVER}" == *"@"* ]] || [[ "${FTP_SERVER}" == *"://"* ]] || [[ "${FTP_SERVER}" == *"/"* ]] || [[ "${FTP_SERVER}" == *":"* ]]; then
            echo "FTP_SERVER must be hostname only (e.g. iad1-shared-b8-36.dreamhost.com)."
            echo "Do not include user@, port :22, sftp://, or a path."
            exit 1
          fi
          if [[ "${FTP_SERVER_DIR}" != /* ]]; then
            echo "FTP_SERVER_DIR must be an absolute path (e.g. /home/pinchard/pinchards.is), not a relative folder name."
            exit 1
          fi
          if [[ "${FTP_SERVER_DIR}" == *"@"* ]] || [[ "${FTP_SERVER_DIR}" == *"://"* ]]; then
            echo "FTP_SERVER_DIR must be a path only. Put the hostname in FTP_SERVER and username in FTP_USERNAME."
            exit 1
          fi
          echo "FTP_SERVER resolves next; FTP_SERVER_DIR length: ${#FTP_SERVER_DIR}"

      - name: Test SSH connection
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        run: |
          set -euo pipefail
          host="$(printf '%s' "${FTP_SERVER}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          user="$(printf '%s' "${FTP_USERNAME}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=20 -p 22 \
            "${user}@${host}" "echo SSH OK from GitHub Actions"

      - name: Upload secrets outside document root
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail
          host="$(printf '%s' "${FTP_SERVER}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          user="$(printf '%s' "${FTP_USERNAME}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          server_dir="$(printf '%s' "${FTP_SERVER_DIR}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          server_dir="${server_dir%/}"
          parent_dir="$(dirname "${server_dir}")"
          remote_dir="${parent_dir}/.config/pinchards.is"
          remote_file="${remote_dir}/secrets.local.php"
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -p 22 \
            "${user}@${host}" \
            "mkdir -p '${remote_dir}' && chmod 700 '${remote_dir}'"
          rsync -avz \
            -e "ssh -i ${HOME}/.ssh/deploy_key -o BatchMode=yes -p 22 -l ${user}" \
            "${{ runner.temp }}/secrets.local.php" \
            "${host}:${remote_file}"
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -p 22 \
            "${user}@${host}" \
            "chmod 600 '${remote_file}'"

      - name: Remove legacy secrets from document root
        continue-on-error: true
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          host="$(printf '%s' "${FTP_SERVER}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          user="$(printf '%s' "${FTP_USERNAME}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          server_dir="$(printf '%s' "${FTP_SERVER_DIR}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          server_dir="${server_dir%/}"
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -p 22 \
            "${user}@${host}" \
            "rm -f '${server_dir}/secrets.local.php'"

      - name: Deploy (rsync over SSH)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail
          host="$(printf '%s' "${FTP_SERVER}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          user="$(printf '%s' "${FTP_USERNAME}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          server_dir="$(printf '%s' "${FTP_SERVER_DIR}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          server_dir="${server_dir%/}/"
          dry_run=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            dry_run="--dry-run"
          fi
          dest="${host}:${server_dir}"
          echo "rsync target host: ${host}"
          echo "rsync target path: ${server_dir}"
          rsync -avzr --delete ${dry_run} \
            --exclude '.git/' \
            --exclude '.git*/' \
            --exclude '.github/' \
            --exclude '.idea/' \
            --exclude 'adrift/' \
            --exclude 'dory/' \
            --exclude 'waves/' \
            --exclude 'secrets.local.php' \
            --exclude 'node_modules/' \
            --exclude 'images/photo/.cache/' \
            --exclude '.DS_Store' \
            -e "ssh -i ${HOME}/.ssh/deploy_key -o BatchMode=yes -p 22 -l ${user}" \
            ./ "${dest}"
